services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: shanghe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/shanghe
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123456}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pg_data:
